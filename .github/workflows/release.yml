name: Release

permissions:
  contents: write

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: steam-cookie-searcher
            os_name: linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: steam-cookie-searcher.exe
            os_name: windows-amd64
          - os: macos-13
            target: x86_64-apple-darwin
            binary_name: steam-cookie-searcher
            os_name: macos-amd64
          - os: macos-14
            target: aarch64-apple-darwin
            binary_name: steam-cookie-searcher
            os_name: macos-arm64

    steps:
    - uses: actions/checkout@v5

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      with:
        targets: ${{ matrix.target }}

    - name: Build Release
      run: cargo build --release --target ${{ matrix.target }}

    - name: Get Version
      id: get_version
      shell: bash
      run: |
        VERSION=$(grep '^version = ' Cargo.toml | cut -d '"' -f 2)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "asset_name=steam-cookie-searcher-${VERSION}-${{ matrix.os_name }}.zip" >> $GITHUB_OUTPUT

    - name: Package Windows
      if: matrix.os == 'windows-latest'
      run: |
        Rename-Item -Path target\${{ matrix.target }}\release\${{ matrix.binary_name }} -NewName "Steam Cookie Searcher.exe"
        Compress-Archive -Path "target\${{ matrix.target }}\release\Steam Cookie Searcher.exe" -DestinationPath ${{ steps.get_version.outputs.asset_name }}

    - name: Package Linux
      if: matrix.os == 'ubuntu-latest'
      run: |
        mkdir -p "Steam Cookie Searcher"
        cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "Steam Cookie Searcher/Steam Cookie Searcher"
        cp assets/readme/logo.png "Steam Cookie Searcher/logo.png"
        zip -r ${{ steps.get_version.outputs.asset_name }} "Steam Cookie Searcher"

    - name: Package macOS
      if: contains(matrix.os, 'macos')
      run: |
        mv "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "target/${{ matrix.target }}/release/Steam Cookie Searcher"
        zip -j ${{ steps.get_version.outputs.asset_name }} "target/${{ matrix.target }}/release/Steam Cookie Searcher"

    - name: Upload to Release
      uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ${{ steps.get_version.outputs.asset_name }}
        asset_name: ${{ steps.get_version.outputs.asset_name }}
        tag: ${{ steps.get_version.outputs.version }}
        overwrite: true
